# ClawPanel 发布构建工作流
# 推送 v* 标签时自动构建跨平台产物并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

jobs:
  # ── 跨平台构建 job ─────────────────────────────────────────────────────────
  build:
    name: 构建 (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            os: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - name: macOS (Intel)
            os: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - name: Linux (x64)
            os: ubuntu-latest
            args: ""
            rust_target: ""
          - name: Windows (x64)
            os: windows-latest
            args: ""
            rust_target: ""

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置版本标签
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.name }}

      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 代码签名（可选）
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows 代码签名（可选）
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.TAG_NAME }}
          releaseName: "ClawPanel ${{ env.TAG_NAME }}"
          releaseBody: "正在构建所有平台安装包，请稍候..."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform.args }}

      # macOS: 重新打包 DMG，添加安装脚本
      - name: 重新打包 macOS DMG（添加安装脚本）
        if: runner.os == 'macOS' && steps.tauri-build.outputs.artifacts != ''
        run: |
          # 安装 create-dmg
          brew install create-dmg

          # 查找生成的 DMG
          ORIGINAL_DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$ORIGINAL_DMG" ]; then
            echo "未找到原始 DMG，跳过重新打包"
            exit 0
          fi

          echo "原始 DMG: $ORIGINAL_DMG"

          # 挂载原始 DMG
          MOUNT_POINT=$(hdiutil attach "$ORIGINAL_DMG" -nobrowse -readonly | grep "/Volumes/" | awk '{print $3}')
          if [ -z "$MOUNT_POINT" ]; then
            echo "挂载 DMG 失败"
            exit 1
          fi

          echo "挂载点: $MOUNT_POINT"

          # 创建临时目录
          TMP_DIR=$(mktemp -d)
          DMG_CONTENTS="$TMP_DIR/dmg-contents"
          mkdir -p "$DMG_CONTENTS"

          # 复制应用
          cp -R "$MOUNT_POINT"/*.app "$DMG_CONTENTS/"

          # 复制安装脚本
          cp scripts/install-mac.command "$DMG_CONTENTS/安装ClawPanel.command"
          chmod +x "$DMG_CONTENTS/安装ClawPanel.command"

          # 创建 Applications 快捷链接
          ln -s /Applications "$DMG_CONTENTS/Applications"

          # 创建说明文件
          cat > "$DMG_CONTENTS/说明.txt" << 'EOF'
ClawPanel 安装说明
==================

方法1（推荐）: 使用安装脚本
----------------------------
双击 "安装ClawPanel.command" 脚本，自动完成安装并移除安全限制

方法2: 手动安装
----------------
1. 将 ClawPanel.app 拖到 Applications 文件夹
2. 打开终端运行: sudo xattr -rd com.apple.quarantine /Applications/ClawPanel.app
3. 从启动台打开 ClawPanel

遇到问题?
---------
访问 https://github.com/jonntd/clawpanel/issues 获取帮助
EOF

          # 卸载原始 DMG
          hdiutil detach "$MOUNT_POINT"

          # 删除原始 DMG
          rm "$ORIGINAL_DMG"

          # 创建新的 DMG
          NEW_DMG="${ORIGINAL_DMG%.dmg}-installer.dmg"
          create-dmg \
            --volname "ClawPanel" \
            --window-pos 200 120 \
            --window-size 800 450 \
            --icon-size 100 \
            --icon "ClawPanel.app" 200 200 \
            --icon "Applications" 600 200 \
            --icon "安装ClawPanel.command" 400 100 \
            --icon "说明.txt" 400 280 \
            --hide-extension "安装ClawPanel.command" \
            --app-drop-link 600 200 \
            "$NEW_DMG" \
            "$DMG_CONTENTS"

          # 清理
          rm -rf "$TMP_DIR"

          # 重命名回原始文件名
          mv "$NEW_DMG" "$ORIGINAL_DMG"

          echo "DMG 重新打包完成: $ORIGINAL_DMG"

      # 重新上传修改后的 DMG
      - name: 上传修改后的 DMG
        if: runner.os == 'macOS' && steps.tauri-build.outputs.artifacts != ''
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.platform.rust_target }}
          path: src-tauri/target/**/*.dmg
          if-no-files-found: ignore

  # ── 所有平台构建完成后，统一更新 Release Notes ─────────────────────────────
  # 独立 job 确保只执行一次，彻底避免多个 matrix job 的竞争条件
  update-release-notes:
    name: 更新 Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'cancelled'
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置版本标签
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: 生成并更新 Release Notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG_NAME#v}"
          DL="https://github.com/${REPO}/releases/download/${TAG_NAME}"

          # ── 生成分类 Changelog ──
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            CHANGELOG_HEADER="自 ${PREV_TAG} 以来的变更"
          else
            RANGE=""
            CHANGELOG_HEADER="主要变更"
          fi

          # 按 conventional commit 前缀分类
          get_logs() {
            local prefix="$1"
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"%s" --no-merges | { grep -iE "^${prefix}" || true; } | sed "s/^${prefix}[:(][^)]*[):] */- /" | head -20
            else
              git log --pretty=format:"%s" --no-merges -30 | { grep -iE "^${prefix}" || true; } | sed "s/^${prefix}[:(][^)]*[):] */- /" | head -20
            fi
          }

          FEATS=$(get_logs "feat")
          FIXES=$(get_logs "fix")
          OTHERS=$(
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"%s" --no-merges | { grep -ivE "^(feat|fix|style|chore|ci|docs|test|build)" || true; } | sed 's/^/- /' | head -10
            else
              git log --pretty=format:"%s" --no-merges -30 | { grep -ivE "^(feat|fix|style|chore|ci|docs|test|build)" || true; } | sed 's/^/- /' | head -10
            fi
          )

          CHANGELOG_BODY=""
          if [ -n "$FEATS" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### ✨ 新功能\n'"${FEATS}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### 🐛 修复\n'"${FIXES}"$'\n'
          fi
          if [ -n "$OTHERS" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### 📦 其他\n'"${OTHERS}"$'\n'
          fi
          if [ -z "$CHANGELOG_BODY" ]; then
            CHANGELOG_BODY=$'\n- 常规更新与优化\n'
          fi

          # ── 构建状态 ──
          if [ "$BUILD_RESULT" = "success" ]; then
            STATUS_BADGE="✅ 全部平台构建成功"
          else
            STATUS_BADGE="⚠️ 部分平台构建失败，请查看 [Actions 日志](https://github.com/${REPO}/actions)"
          fi

          # ── 写入 Release Notes ──
          {
            echo "${STATUS_BADGE}"
            echo ""
            echo "## 📥 下载安装"
            echo ""
            echo "根据你的操作系统选择对应安装包，点击文件名即可下载："
            echo ""
            echo "### macOS"
            echo "| 芯片 | 安装包 |"
            echo "|------|--------|"
            echo "| Apple Silicon (M1/M2/M3/M4) | [ClawPanel_${VERSION}_aarch64.dmg](${DL}/ClawPanel_${VERSION}_aarch64.dmg) |"
            echo "| Intel | [ClawPanel_${VERSION}_x64.dmg](${DL}/ClawPanel_${VERSION}_x64.dmg) |"
            echo ""
            echo '> **⚠️ 首次打开提示"无法验证开发者"？** 在终端执行：`sudo xattr -rd com.apple.quarantine /Applications/ClawPanel.app`，或前往 **系统设置 → 隐私与安全性** 点击「仍要打开」。'
            echo ""
            echo "### Windows"
            echo "| 格式 | 安装包 |"
            echo "|------|--------|"
            echo "| EXE 安装器（推荐） | [ClawPanel_${VERSION}_x64-setup.exe](${DL}/ClawPanel_${VERSION}_x64-setup.exe) |"
            echo "| MSI 安装器 | [ClawPanel_${VERSION}_x64_en-US.msi](${DL}/ClawPanel_${VERSION}_x64_en-US.msi) |"
            echo ""
            echo "### Linux"
            echo "| 格式 | 安装包 |"
            echo "|------|--------|"
            echo "| AppImage（免安装） | [ClawPanel_${VERSION}_amd64.AppImage](${DL}/ClawPanel_${VERSION}_amd64.AppImage) |"
            echo "| DEB（Debian/Ubuntu） | [ClawPanel_${VERSION}_amd64.deb](${DL}/ClawPanel_${VERSION}_amd64.deb) |"
            echo "| RPM（Fedora/RHEL） | [ClawPanel-${VERSION}-1.x86_64.rpm](${DL}/ClawPanel-${VERSION}-1.x86_64.rpm) |"
            echo ""
            echo "---"
            echo ""
            echo "## 🚀 首次使用"
            echo ""
            echo "1. 安装并打开 ClawPanel"
            echo "2. 首次运行会自动检测 Node.js 环境和 OpenClaw CLI"
            echo "3. 如未安装 OpenClaw，按提示一键安装即可"
            echo "4. 安装完成后自动跳转仪表盘，开始使用"
            echo ""
            echo '> **系统要求**：Node.js 18+（推荐 22 LTS）'
            echo ""
            echo "---"
            echo ""
            echo "## ${CHANGELOG_HEADER}"
            echo "${CHANGELOG_BODY}"
            echo "---"
            echo ""
            echo "📖 [项目主页](https://github.com/${REPO}) · 💬 [反馈问题](https://github.com/${REPO}/issues) · 📣 [QQ 群](https://qt.cool/c/OpenClaw)"
          } > release_body.md

          gh release edit "$TAG_NAME" --notes-file release_body.md
